Exercise: Logging and Reporting in Test Automation
Exercises for the "Back-End Test Automation" course @ SoftUni

0.	Prerequisites
•	.NET 8 SDK
•	Git
•	GitHub account
•	Optional (for local viewing): Allure CLI (requires Java).
Starter Project
You are provided with the Rick and Morty API Starter Project. This project is a ready-to-run .NET 8 + NUnit test suite that calls the public Rick and Morty API (https://rickandmortyapi.com/api) and verifies real responses.
The Rick and Morty API is a public JSON API that lets you query data about:
•	Characters (name, status, species, gender, location, etc.)
•	Also, episodes/locations, but we will focus on characters
In this project, the tests call endpoints like:
•	GET /character/1 - (fetch a single character by id)
•	GET /character/1,2,3 - (fetch multiple characters by id)
•	GET /character/?name=rick&status=alive - (filter characters by query parameters)
Find more about the endpoints: https://rickandmortyapi.com/documentation#character-schema 
What the tests do:
The project contains 8 passing API tests in CharacterTests that verify things like:
•	The API returns HTTP 200 OK for valid requests
•	Returned JSON can be deserialized into C# models (Character, ApiResponse<T>)
•	The data matches expectations (for example: correct character id, non-empty results, correct filtering behavior)
There is also an optional demo failing test marked with [Explicit]. It does not run by default and exists only for demonstrating reporting behavior (attachments in Allure).
Unzip the provided Rick-and-Morty-API.zip and open the folder in your terminal/IDE.
Verify the project works:
dotnet restore
dotnet test
 
1. Add Allure Framework 
1.1 Install Allure.NUnit (NuGet)
dotnet add package Allure.NUnit --version 2.14.1
1.2 Create allureConfig.json in the project root:
{
  "allure": {
    "directory": "../../../allure-results"
  }
}
Note: Why ../../../ ? Tests execute from bin/Debug/net8.0, so 3 levels up lands at the project root.
If your allure-results folder appears outside the project root, fix it by adjusting the number of ../ (move it by exactly one level).

1.3 Copy allureConfig.json to output
Add this to RickAndMortyTests.csproj:
<ItemGroup>
  <None Update="allureConfig.json">
    <CopyToOutputDirectory>Always</CopyToOutputDirectory>
  </None>
</ItemGroup>

1.4 Enable Allure for the whole test suite
Open Tests/BaseTest.cs and add:
using Allure.NUnit;

[AllureNUnit]
public class BaseTest
{
    ...
}

1.5 Run tests and verify allure-results is generated
dotnet test
You should see an allure-results folder.

1.6 View report locally
Install Allure CLI via npm (as you already know, it requires Java):
 npm i -g allure-commandline@2.36.0
Open the report (temp directory):
allure serve allure-results
Or generate the report (creates a folder): 
allure generate ./allure-results -o ./allure-report --clean
And then open it: 
allure open ./allure-report

Or generate a single HTML file report and open it in your browser:
allure generate ./allure-results -o ./allure-report-single --clean --single-file

2. Auto-Attachments on Failure
Auto-Attachments on Failure means: when a test fails, we automatically add the last API response body (JSON) to the Allure report as an attachment. This way, you can open the failed test in Allure and immediately see what the server returned, without rerunning the test or digging through logs.
Open Tests/BaseTest.cs and complete the TearDown TODO. Use this code:
using Allure.Net.Commons;
using NUnit.Framework.Interfaces;
using System.Text;


    [TearDown]
    public void TearDown()
    {
        var status = TestContext.CurrentContext.Result.Outcome.Status;

        if (status == TestStatus.Failed && !string.IsNullOrWhiteSpace(_apiClient.LastResponseBody))
        {
            AllureApi.AddAttachment(
                "response-body",
                "application/json",
                Encoding.UTF8.GetBytes(_apiClient.LastResponseBody),
                "json"
            );
        }

        _apiClient.Dispose();
    }

Verify it works using the provided [Explicit] demo test:
dotnet test --filter FullyQualifiedName~IntentionalFailure
 
3. Add Basic Metadata
In Allure, tests don't have to be a flat list. You can add labels (metadata) that help you organize and filter the report. These attributes do not change how the test runs. They only affect how the test appears in the Allure UI.
Add Allure metadata to organize the report. Update Tests/CharacterTests.cs:
3.1 Add usings:
using Allure.Net.Commons;
using Allure.NUnit.Attributes;
using Allure.Net.Commons;
This gives access to shared Allure types, most importantly:
•	SeverityLevel (the enum used by [AllureSeverity])
•	AllureApi (used for steps and attachments later)
using Allure.NUnit.Attributes;
This gives you the NUnit-specific Allure attributes like:
•	[AllureSuite], [AllureFeature], [AllureDescription], [AllureSeverity], [AllureTag]
3.2 Add class-level grouping:
[AllureSuite("Rick and Morty API")]
[AllureFeature("Character Endpoints")]

public class CharacterTests : BaseTest
{
    ...
}
Class-level grouping (applies to all tests in the class).
[AllureSuite("Rick and Morty API")]
Think of Suite as a high-level bucket, like a folder in the report.
•	Example idea: “Rick and Morty API”, “Authentication”, “Orders API”
•	In the Allure UI, it helps you group tests under a common parent.
[AllureFeature("Character Endpoints")]
Think of Feature as a smaller grouping inside the suite.
•	Example: “Character Endpoints”, “Episode Endpoints”, “Search”
•	In Behaviors view, Feature is especially useful for navigating by product/API features.
 
 
3.3 Add metadata to TWO tests (example):
[Test]
[AllureDescription("Verify Rick Sanchez character data is correct")]
[AllureSeverity(SeverityLevel.critical)]
[AllureTag("smoke")]
[AllureTag("character")]
public async Task GetCharacter_RickSanchez_ReturnsCorrectData()
{ ... }

[Test]
[AllureDescription("Verify filtering by both name and status works correctly")]
[AllureSeverity(SeverityLevel.normal)]
[AllureTag("regression")]
[AllureTag("filter")]
public async Task FilterCharacters_ByNameAndStatus_ReturnsFilteredResults()
{ ... }
Test-level metadata (applies to a single test)
[AllureDescription("...")]
A human-readable explanation of what the test is proving.
•	Good descriptions say what the behavior is, not “test should pass”.
[AllureSeverity(SeverityLevel.critical)]
Severity is impact, not priority and not “how hard the test is”.
•	critical: a failure blocks releases (core functionality broken)
•	normal: important but not catastrophic
•	minor: low impact, informational
[AllureTag("smoke")], [AllureTag("regression")], etc.
Tags are simple labels used for filtering in the Allure UI.
•	smoke: very small set of key tests you run often
•	regression: broader set for full verification
•	You can also tag by area: character, filter, api
Note: in real projects, the value of a report is not “pretty HTML”. It’s:
•	being able to find failures fast
•	being able to filter by feature, severity, and tags
•	being able to hand the report to someone and they understand it without reading the code
 
 
4. Add Test Steps
Enhance ONE test with steps so the report shows a clear execution story.
A step is a named block of actions that appears as a separate line in the Allure report.
It does not change how the test runs. It changes how the test is presented and debugged.
Without steps, a failed test usually looks like:
•	one big blob of code
•	one assertion message
•	one stack trace
With steps, the report becomes a readable story:
•	Step 1: Send request
•	Step 2: Verify result count
•	Step 3: Verify specific values
So, when the test fails, you immediately see which step failed, not just “the test failed somewhere”.
Update GetMultipleCharacters_Returns3Characters like this:
[Test]
public async Task GetMultipleCharacters_Returns3Characters()
{
    List<Character>? characters = null;

    await AllureApi.Step("Step 1: Request characters 1, 2, 3", async () =>
    {
        var url = $"{ApiClient.BaseUrl}/character/1,2,3";
        var response = await _apiClient.GetAsync(url);
        characters = await _apiClient.ReadJsonAsync<List<Character>>(response);
        Assert.That((int)response.StatusCode, Is.EqualTo(200)); });

    AllureApi.Step("Step 2: Verify count is 3", () =>
    {
        Assert.That(characters, Is.Not.Null);
        Assert.That(characters!.Count, Is.EqualTo(3));
    });

    AllureApi.Step("Step 3: Verify character IDs", () =>
    {
        Assert.That(characters![0].Id, Is.EqualTo(1));
        Assert.That(characters[1].Id, Is.EqualTo(2));
        Assert.That(characters[2].Id, Is.EqualTo(3));
    });
}

AllureApi.Step() in practice
AllureApi.Step("Step name", action) wraps a piece of logic and records it in the report.
There are two common forms:
1) Async step (awaitable)
Use this when the step contains await (HTTP calls, async reads, etc.):
await AllureApi.Step("Request characters 1,2,3", async () =>
{
    // async code here
});
2) Sync step
Use this when the step contains only checks (assertions, simple logic):
AllureApi.Step("Verify count is 3", () =>
{
    // sync code here 
});
Why we split the test into steps like this
Step 1: Request
This is the "action" part:
•	build the URL
•	send HTTP request
•	parse JSON
•	verify status code
If this fails, you know the failure is related to API communication / response.
Step 2: Verify count
This is the first “validation” layer:
•	make sure you got a list
•	make sure it contains 3 items
If this fails, you know the API returned unexpected structure or data size.
Step 3: Verify IDs
This is detailed validation:
•	verify the exact IDs are correct
If this fails, you know the API returned wrong items, not “nothing”.
The real reason steps are valuable
In CI, you often don’t have time to reproduce locally. Steps give you:
•	clear failure location (which part of the workflow broke)
•	better report readability for non-developers too
•	a structure that scales when tests grow
 
5. GitHub Actions Workflow with Allure Reporting
Create a CI workflow in GitHub Actions that still uploads the report artifacts even when tests fail.
What makes this workflow different?
Most CI workflows stop being useful the moment tests fail, because the "report steps" never run.
Your workflow must do the opposite:
•	Let the test step fail normally (so the job is red when tests are failing).
•	But force "report + artifacts" steps to run anyway using if: ${{ always() }}.
•	GitHub Actions applies an implicit if: success() to steps. So, when tests fail, later steps are skipped. always() overrides that and runs the step no matter what (success, failure, cancelled).
This workflow:
•	Runs on push and pull requests to main/master, and can be started manually.
•	On an Ubuntu runner, it checks out the repo, sets up .NET 8, then restores, builds, and runs NUnit tests, producing a TRX file.
•	Even if tests fail, it still (if: always()) installs Allure, generates an Allure HTML report from allure-results into allure-report (or creates an empty report folder if results are missing), and uploads artifacts: the TRX file, allure-results, and allure-report.
name: Run Tests with Allure

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Run tests (create TRX)
      run: dotnet test --no-build --logger "trx;LogFileName=test-results.trx"

    # Everything below runs even if tests failed
    - name: Install Allure CLI
      if: always()
      run: |
        wget -q https://github.com/allure-framework/allure2/releases/download/2.36.0/allure-2.36.0.tgz
        tar -zxf allure-2.36.0.tgz
        sudo mv allure-2.36.0 /opt/allure
        sudo ln -sf /opt/allure/bin/allure /usr/bin/allure

    - name: Generate Allure report (if results exist)
      if: always()
      run: |
        if [ -d "allure-results" ]; then
          allure generate allure-results --clean -o allure-report
        else
          echo "No allure-results folder found. Check allureConfig.json path."
          mkdir -p allure-report
        fi

    - name: Upload NUnit TRX
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: test-results
        path: "**/*.trx"

    - name: Upload allure-results
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: allure-results
        path: allure-results/

    - name: Upload allure-report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: allure-report
        path: allure-report/
 
6. Run an intentional failing test and still generate Allure report
We’re creating a second workflow file only for the demo because the demo test fails on purpose.
If we put that failing test into the normal CI workflow (the one that runs on every push/PR), then:
•	every push would turn the workflow red,
•	the CI status would become meaningless,
•	and nobody would trust the pipeline (which is a very human outcome, but not what we want).
So, we keep the original workflow as the "real CI" (runs normal tests and should be green when the code is healthy), and we add a separate demo workflow that you run manually (workflow_dispatch) only when you want to show:
tests can fail,
but Allure report + artifacts are still generated and uploaded because of if: ${{ always() }}.
In short:
one workflow = real CI, one workflow = controlled failure demo.name: Demo - Failing Test with Allure

on:
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      # Run ONLY the demo failing test (will fail the job)
      - name: Run demo failing test
        run: dotnet test --no-build --logger "trx;LogFileName=test-results.trx" --filter "FullyQualifiedName~IntentionalFailure"

      # Everything below runs even if tests failed
      - name: Install Allure CLI
        if: ${{ always() }}
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.36.0/allure-2.36.0.tgz
          tar -zxf allure-2.36.0.tgz
          sudo mv allure-2.36.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/bin/allure

      - name: Generate Allure report (if results exist)
        if: ${{ always() }}
        run: |
          if [ -d "allure-results" ]; then
            allure generate allure-results --clean -o allure-report
          else
            echo "No allure-results folder found. Check your Allure output path."
            mkdir -p allure-report
          fi

      - name: Upload NUnit TRX
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: demo-test-results
          path: "**/*.trx"
          if-no-files-found: warn

      - name: Upload allure-results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: demo-allure-results
          path: allure-results/
          if-no-files-found: warn

      - name: Upload allure-report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: demo-allure-report
          path: allure-report/

 
